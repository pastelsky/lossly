name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'THIRD_PARTY_LICENSES.md'
      - 'CHANGELOG.md'
      - '.github/workflows/ci.yml'

jobs:
  # ── Step 1: Determine next version ──────────────────────────────────────────
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}
      changelog: ${{ steps.semver.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          release_branches: main
          # Conventional commit prefixes:
          # feat: → minor bump, fix:/chore:/refactor: → patch bump
          # BREAKING CHANGE → major bump

  # ── Step 2: Build macOS app ──────────────────────────────────────────────────
  build:
    name: Build macOS App
    runs-on: macos-15
    needs: version
    outputs:
      version: ${{ needs.version.outputs.version }}
      tag: ${{ needs.version.outputs.tag }}
      changelog: ${{ needs.version.outputs.changelog }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          # Build as a regular Release build (not archive) to avoid signing issues
          xcodebuild build \
            -project Lossly.xcodeproj \
            -scheme Lossly \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath ${{ runner.temp }}/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION=${{ needs.version.outputs.version }} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
          | xcpretty

      - name: Find and copy built app
        run: |
          echo "Looking for Lossly.app..."
          find ${{ runner.temp }}/DerivedData -name "Lossly.app" -not -path "*/Index.noindex/*" | head -5
          APP_PATH=$(find ${{ runner.temp }}/DerivedData -name "Lossly.app" -not -path "*/Index.noindex/*" | head -1)
          echo "Found: $APP_PATH"
          cp -r "$APP_PATH" ${{ runner.temp }}/Lossly.app

      - name: Ad-hoc code sign
        run: |
          # Sign all frameworks/dylibs first, then the app bundle
          find ${{ runner.temp }}/Lossly.app -name "*.dylib" -o -name "*.framework" | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          codesign --deep --force --sign - ${{ runner.temp }}/Lossly.app
          echo "Signed successfully"
          codesign --verify ${{ runner.temp }}/Lossly.app && echo "Verification passed"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Lossly ${{ needs.version.outputs.version }}" \
            --window-pos 200 120 \
            --window-size 560 400 \
            --icon-size 128 \
            --icon "Lossly.app" 140 180 \
            --hide-extension "Lossly.app" \
            --app-drop-link 420 180 \
            "${{ runner.temp }}/Lossly-${{ needs.version.outputs.version }}.dmg" \
            "${{ runner.temp }}/Lossly.app" || \
          (cd ${{ runner.temp }} && zip -r \
            "Lossly-${{ needs.version.outputs.version }}.zip" \
            Lossly.app)

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lossly-dmg
          path: |
            ${{ runner.temp }}/Lossly-*.dmg
            ${{ runner.temp }}/Lossly-*.zip
          retention-days: 7

  # ── Step 3: Tag + publish GitHub Release ────────────────────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: Lossly-dmg
          path: dist/

      - name: Create and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ needs.build.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Lossly ${{ needs.build.outputs.version }}
          body: |
            ## What's Changed

            ${{ needs.build.outputs.changelog }}

            ---

            ### Install
            1. Download **Lossly-${{ needs.build.outputs.version }}.dmg** below
            2. Open the DMG and drag **Lossly.app** to your Applications folder
            3. If macOS says "app is damaged", run in Terminal:
               ```
               xattr -cr /Applications/Lossly.app
               ```
            4. Launch Lossly

            > Lossly is not yet notarized. We're working on it. The `xattr` command is safe — it removes the macOS quarantine flag added when downloading from the internet.

            ### Requirements
            - macOS 14.0 (Sonoma) or later
            - Apple Silicon (arm64)
          files: dist/*
          draft: false
          prerelease: false
